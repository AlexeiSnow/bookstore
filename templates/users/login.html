{% extends 'books/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 40px auto;">

    <div style="text-align: center; margin-bottom: 32px;">
        <div style="font-size: 48px; margin-bottom: 14px;">👋</div>
        <h2>С возвращением</h2>
        <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">Войдите в свой аккаунт</p>
    </div>

    <div style="background: white; border-radius: 24px; padding: 36px; box-shadow: var(--shadow); border: 1px solid rgba(109,40,217,0.06);">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 13px; font-size: 0.95rem; margin-top: 4px; border-radius: 14px;">
                Войти
            </button>
        </form>
        <p style="margin-top: 22px; text-align: center; color: var(--text-muted); font-size: 0.875rem;">
            Нет аккаунта? <a href="/users/register/" style="font-weight: 700; color: var(--primary);">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
